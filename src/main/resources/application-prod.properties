# =====================================================
# Profile: prod - MySQL producao
# TODAS as credenciais OBRIGATORIAMENTE via variaveis de ambiente
# Nunca hardcode de senhas em producao!
# =====================================================

# MySQL producao - variaveis de ambiente obrigatorias
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool HikariCP - configuracao robusta para producao
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# JPA - NUNCA usar create-drop ou update em producao!
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# -----------------------------------------------------------
# IMPORTANTE: schema precisa existir antes do deploy (tabela calendario_evento)
# Consulte a documentacao de deployment para o passo a passo
# -----------------------------------------------------------

# Porta
server.port=8081

# Logs apenas erros
logging.level.com.automotiva.estetica.rick=WARN
logging.level.org.springframework.web=ERROR

# Desabilitar console H2 (nao existe em prod)
spring.h2.console.enabled=false

# Configuracoes de seguranca
server.error.include-stacktrace=never
server.error.include-message=never

# data.sql - nunca executar em producao
spring.sql.init.mode=never

# Google Calendar via variaveis de ambiente em prod
google.calendar.credentials.file=${GOOGLE_CREDENTIALS_FILE:classpath:credentials-oauth.json}
google.calendar.application.name=ApiAgendamentoServices
google.calendar.tokens.directory.path=${GOOGLE_TOKENS_PATH:tokens}

# RabbitMQ via variaveis de ambiente
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:123456}
