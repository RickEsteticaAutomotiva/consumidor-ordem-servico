# =====================================================
# Profile: test - H2 em memoria para testes unitarios
# =====================================================

# H2 para testes - explicitamente declarado
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA para testes
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
# Nao executar data.sql em testes (evita erros de tabela nao encontrada)
spring.sql.init.mode=never


# Desabilitar console H2 em testes
spring.h2.console.enabled=false

# Porta diferente para testes
server.port=8080

# Swagger/OpenAPI desabilitado em testes
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Google Calendar (configuracoes necessarias para o contexto subir)
google.calendar.credentials.file=classpath:credentials-oauth.json
google.calendar.application.name=ApiAgendamentoServices
google.calendar.tokens.directory.path=tokens

# RabbitMQ (localhost padrao)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=admin
spring.rabbitmq.password=123456

