# =====================================================
# Profile: dev - MySQL local
# Prerequisito: MySQL rodando em localhost:3306
# Database: rick_dev
# =====================================================

# MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/rick_dev?useUnicode=true&characterEncoding=UTF-8&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=rick
spring.datasource.password=rick@dev2024
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool HikariCP (padrao Spring Boot) - ajuste fino para dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# 'none' - schema mantido externamente (tabela calendario_evento deve existir)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
# Permite que Hibernate veja as tabelas criadas manualmente
spring.jpa.defer-datasource-initialization=true

# -----------------------------------------------------------
# IMPORTANTE: garanta que a tabela calendario_evento exista antes da primeira execucao
# -----------------------------------------------------------

# Porta
server.port=8081

# Logs
logging.level.com.automotiva.estetica.rick=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# data.sql - desabilitado (schema e dados gerenciados pelo Flyway)
spring.sql.init.mode=never
